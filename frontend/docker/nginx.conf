#/* cspell:disable */

#config Nginx pour SPA React

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # React Router — toutes les routes inconnues → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressif pour les assets Vite (hash dans le nom de fichier)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Pas de cache pour index.html (toujours la version la plus récente)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;
}