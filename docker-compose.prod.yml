#/* cspell:disable */

services:

  # ── Base de données ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: loca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loca_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend Laravel ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loca_backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      SANCTUM_TOKEN_EXPIRATION: ${SANCTUM_TOKEN_EXPIRATION}
    volumes:
      - storage_uploads:/var/www/html/public/storage
      - backend_logs:/var/www/html/storage/logs
    networks:
      - loca_network
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend React (build statique) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_URL}/api
    container_name: loca_frontend
    restart: unless-stopped
    networks:
      - loca_network
    depends_on:
      - backend

  # ── Reverse Proxy Nginx ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: loca_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_uploads:/var/www/storage:ro
    networks:
      - loca_network
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  storage_uploads:
  backend_logs:

networks:
  loca_network:
    driver: bridge